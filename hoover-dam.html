<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hoover Dam Tour | Milemundo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#3f4a2c;
  color:#fff;
}

/* HEADER */
header{
  min-height:80vh;
  background:
    linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.7)),
    url('./hoover6.png') center/cover no-repeat;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

/* FLECHA */
.back{
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  background:#6f8f4a;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
}

/* LANG */
.lang-switch button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  margin-left:5px;
  background:#6f8f4a;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:2.5rem;
  margin-bottom:20px;
}

.hero p{
  max-width:700px;
  margin:auto;
  margin-bottom:30px;
}

.btn{
  display:inline-block;
  padding:15px 25px;
  margin:10px;
  border-radius:15px;
  background:#6f8f4a;
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

/* SECTIONS */
section{
  padding:60px 20px;
}

.container{
  max-width:1200px;
  margin:auto;
}

/* GALERIA */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.gallery img{
  width:100%;
  height:300px;
  object-fit:cover; /* 🔥 ESTO ARREGLA LA DISTORSIÓN */
  border-radius:20px;
}

/* CONTACT */
.contact{
  text-align:center;
  background:#2f2419;
  padding:50px 20px;
}

footer{
  text-align:center;
  padding:20px;
  background:#1e140d;
}
</style>
</head>

<body>

<header>
  <div class="topbar">
    <a href="index.html" class="back">&#8592;</a>

    <div class="lang-switch">
      <button onclick="setLanguage('en')">EN</button>
      <button onclick="setLanguage('es')">ES</button>
    </div>
  </div>

  <div class="hero">
    <h1 data-en="Hoover Dam Tour with Milemundo"
        data-es="Tour a la Presa Hoover con Milemundo">
      Hoover Dam Tour with Milemundo
    </h1>

    <p data-en="Discover one of the most iconic landmarks near Las Vegas."
       data-es="Descubre uno de los lugares más icónicos cerca de Las Vegas.">
      Discover one of the most iconic landmarks near Las Vegas.
    </p>

    <a href="#gallery" class="btn">Ver Galería</a>
    <a href="#contact" class="btn">Reservar</a>
  </div>
</header>

<section id="gallery">
  <div class="container">
    <h2>Galería Hoover Dam</h2>

    <div class="gallery">
      <img src="./hoover2.jpeg">
      <img src="./hoover3.jpeg">
      <img src="./hoover5.jpeg">
      <img src="./hoover6.png">
      <img src="./hoover8.jpeg">
    </div>
  </div>
</section>

<section id="contact" class="contact">
  <h2>Contacto</h2>
  <p>Phone / WhatsApp: +1 (702) 665-9598</p>
  <p>Email: tours@milemundo.com</p>

  <a href="https://wa.me/17026659598" class="btn">WhatsApp</a>
</section>

<footer>
  © 2026 Milemundo
</footer>

<script>
function setLanguage(lang){
  document.querySelectorAll('[data-en]').forEach(el=>{
    el.textContent = el.getAttribute('data-'+lang);
  });
}
</script>

</body>
</html>
