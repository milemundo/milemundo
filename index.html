<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milemundo | Las Vegas Tours & Adventures</title>
  <meta name="description" content="Private tours and adventures in Las Vegas, the Grand Canyon, Hoover Dam, hotels, desert experiences, and custom trips." />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:Arial,sans-serif;
      background:#3f4a2c;
      color:#f5f1e8;
      line-height:1.6;
      overflow-x:hidden;
    }

    img{
      max-width:100%;
      height:auto;
      display:block;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    :root{
      --olive:#3f4a2c;
      --olive-2:#55643a;
      --olive-3:#6c7d4a;
      --brown:#3a2718;
      --brown-2:#4a3321;
      --brown-3:#6a4a31;
      --brown-soft:rgba(58,39,24,0.72);
      --cream:#f5e8d0;
      --gold:#d9a441;
      --gold-2:#f0bf64;
      --shadow:0 10px 30px rgba(0,0,0,0.28);
    }

    header{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      background:
        linear-gradient(rgba(52,38,24,0.42), rgba(52,38,24,0.70)),
        url('milemundo-banner.png') 60% 22% / 155% auto no-repeat;
      background-color:var(--olive);
      position:relative;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 14px;
      gap:12px;
      background:rgba(42,30,18,0.28);
      backdrop-filter:blur(6px);
      position:relative;
      z-index:20;
    }

    .logo{
      font-size:1.75rem;
      font-weight:900;
      letter-spacing:1.5px;
      color:#f4e4c7;
      text-shadow:0 3px 10px rgba(0,0,0,0.35);
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .lang-switch{
      display:flex;
      gap:8px;
    }

    .lang-btn{
      border:none;
      background:linear-gradient(135deg,#8d5f2f,#d89d47);
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
      min-width:48px;
      box-shadow:0 8px 18px rgba(0,0,0,0.25);
      border:1px dashed rgba(255,255,255,0.35);
      transition:0.25s;
    }

    .lang-btn:hover,
    .lang-btn.active{
      transform:translateY(-2px);
      background:linear-gradient(135deg,#a46f34,#f0b656);
      color:#2d2115;
    }

    .hero{
      flex:1;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      text-align:center;
      padding:28px 14px 38px;
      position:relative;
    }

    .hero-content{
      width:100%;
      max-width:720px;
      background:linear-gradient(180deg, rgba(43,28,18,0.42), rgba(43,28,18,0.60));
      backdrop-filter:blur(4px);
      padding:80px 16px 24px;
      border-radius:26px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,0.08);
      position:relative;
      overflow:visible;
    }

    .hero h1{
      font-size:2rem;
      margin-bottom:14px;
      color:#fff0d4;
      line-height:1.16;
      font-weight:900;
      text-shadow:0 3px 10px rgba(0,0,0,0.28);
      position:relative;
      z-index:2;
    }

    .hero p{
      font-size:1rem;
      max-width:620px;
      margin:0 auto 22px;
      color:#fff7ea;
      line-height:1.7;
      position:relative;
      z-index:2;
    }

    .hero-buttons{
      display:flex;
      flex-direction:column;
      gap:12px;
      position:relative;
      z-index:2;
    }

    .btn{
      display:inline-block;
      width:100%;
      padding:15px 20px;
      border-radius:18px;
      font-weight:900;
      font-size:1rem;
      transition:0.25s;
      border:1px dashed rgba(255,255,255,0.35);
      box-shadow:0 10px 18px rgba(0,0,0,0.18);
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .btn-primary{
      background:linear-gradient(135deg,#c77b16,#f1b24f);
      color:#fff8ee;
    }

    .btn-secondary{
      background:linear-gradient(135deg,#4c3120,#6b452d);
      color:#fff8ee;
    }

    section{
      padding:60px 16px;
    }

    .container{
      max-width:1200px;
      margin:auto;
      width:100%;
    }

    .section-title{
      text-align:center;
      font-size:1.85rem;
      margin-bottom:14px;
      color:#f0dfc5;
      line-height:1.2;
    }

    .section-subtitle{
      text-align:center;
      max-width:800px;
      margin:0 auto 34px;
      color:#efe4d4;
      font-size:0.97rem;
    }

    .cards{
      display:grid;
      grid-template-columns:1fr;
      gap:22px;
    }

    .card{
      background:linear-gradient(135deg, var(--brown-2), var(--olive-2));
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,0.25);
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.10);
    }

    .card:hover{
      transform:translateY(-6px);
    }

    .card img{
      width:100%;
      height:190px;
      object-fit:cover;
      display:block;
    }

    .card-content{
      padding:18px;
      background:linear-gradient(180deg, rgba(58,39,24,0.30), rgba(85,100,58,0.22));
    }

    .card h3{
      margin-bottom:12px;
      color:#f5dfbf;
      font-size:1.25rem;
      line-height:1.3;
    }

    .card p{
      color:#f7efe3;
      margin-bottom:18px;
      font-size:0.95rem;
    }

    .price{
      color:#dfe6b7;
      font-weight:bold;
      font-size:1.02rem;
    }

    .about{
      background:#4b3724;
    }

    .about-box{
      display:grid;
      grid-template-columns:1fr;
      gap:22px;
      align-items:center;
    }

    .about-box img{
      width:100%;
      height:100%;
      min-height:250px;
      object-fit:cover;
      display:block;
      border-radius:20px;
      box-shadow:0 8px 20px rgba(0,0,0,0.25);
    }

    .about-text h2{
      font-size:1.85rem;
      margin-bottom:18px;
      color:#f2dfc3;
      line-height:1.2;
    }

    .about-text p{
      margin-bottom:18px;
      color:#f8f1e5;
      font-size:0.98rem;
    }

    .services-list{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      margin-top:24px;
    }

    .service-item{
      background:linear-gradient(135deg, var(--brown-3), var(--olive-3));
      padding:18px;
      border-radius:14px;
      text-align:center;
      font-weight:bold;
      color:#fff5e8;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 8px 18px rgba(0,0,0,0.18);
    }

    .contact{
      background:#2f2419;
    }

    .contact-box{
      max-width:850px;
      margin:auto;
      background:linear-gradient(135deg, var(--brown-2), var(--olive-2));
      padding:28px 18px;
      border-radius:20px;
      box-shadow:0 8px 20px rgba(0,0,0,0.25);
      text-align:center;
      border:1px solid rgba(255,255,255,0.08);
    }

    .contact-box p{
      margin-bottom:15px;
      color:#fff3e0;
      font-size:0.98rem;
    }

    .contact-info{
      font-size:1rem;
      font-weight:bold;
      color:#f0dfc5;
      margin-top:15px;
      word-break:break-word;
    }

    footer{
      background:#21170f;
      color:#d6c3a8;
      text-align:center;
      padding:22px 15px;
      font-size:0.95rem;
    }

    .wheel-3d{
      position:absolute;
      top:80px;
      left:50%;
      transform:translateX(-50%);
      width:260px;
      height:160px;
      perspective:1200px;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:3;
      pointer-events:none;
    }

    .wheel-track{
      position:relative;
      width:100%;
      height:100%;
      transform-style:preserve-3d;
      animation:spin 12s linear infinite;
    }

    .wheel-item{
      position:absolute;
      top:50%;
      left:50%;
      width:150px;
      padding:12px 10px;
      text-align:center;
      border-radius:18px;
      background:linear-gradient(135deg,#7b5330,#6f8442);
      color:#fff;
      font-weight:800;
      box-shadow:0 10px 20px rgba(0,0,0,0.3);
      border:1px dashed rgba(255,255,255,0.35);
      transform-origin:center center;
      margin-left:-75px;
      margin-top:-24px;
      backface-visibility:hidden;
    }

    .wheel-item:nth-child(1){ transform:rotateY(0deg) translateZ(170px); }
    .wheel-item:nth-child(2){ transform:rotateY(90deg) translateZ(170px); }
    .wheel-item:nth-child(3){ transform:rotateY(180deg) translateZ(170px); }
    .wheel-item:nth-child(4){ transform:rotateY(270deg) translateZ(170px); }

    @keyframes spin{
      from{ transform:rotateY(0deg); }
      to{ transform:rotateY(360deg); }
    }

    .main-logo{
      width:260px;
      max-width:80%;
      margin:0 auto 10px;
      display:block;
      position:relative;
      z-index:3;
    }

    @media (min-width: 768px){
      header{
        background:
          linear-gradient(rgba(52,38,24,0.56), rgba(52,38,24,0.72)),
          url('milemundo-banner.png') center center / cover no-repeat;
      }

      .topbar{
        padding:20px 30px;
      }

      .logo{
        font-size:2rem;
      }

      .hero{
        align-items:center;
        padding:110px 20px 70px;
      }
       .hero-content{  
              max-width:900px;
        padding:190px 25px 40px;
        transform:translateY(90px);
      }

      .wheel-3d{
        top:-110px;
        width:320px;
        height:180px;
      }

      .wheel-item{
        width:170px;
        margin-left:-85px;
      }

      .wheel-item:nth-child(1){ transform:rotateY(0deg) translateZ(190px); }
      .wheel-item:nth-child(2){ transform:rotateY(90deg) translateZ(190px); }
      .wheel-item:nth-child(3){ transform:rotateY(180deg) translateZ(190px); }
      .wheel-item:nth-child(4){ transform:rotateY(270deg) translateZ(190px); }

      .hero h1{
        font-size:3rem;
      }

      .hero p{
        font-size:1.2rem;
        margin-bottom:30px;
      }

      .hero-buttons{
        flex-direction:row;
        justify-content:center;
        flex-wrap:wrap;
      }

      .btn{
        width:auto;
        min-width:210px;
        padding:14px 24px;
      }

      .cards{
        grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
        gap:25px;
      }

      .about-box{
        grid-template-columns:1fr 1fr;
        gap:35px;
      }

      .about-box img{
        min-height:420px;
      }

      .services-list{
        grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
        gap:18px;
      }

      .section-title{
        font-size:2.2rem;
      }

      .section-subtitle{
        margin:0 auto 45px;
      }

      .contact-box{
        padding:35px 25px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="topbar">
      <div class="logo">MILEMUNDO</div>

      <div class="topbar-right">
        <div class="lang-switch">
          <button class="lang-btn active" onclick="setLanguage('en', this)">EN</button>
          <button class="lang-btn" onclick="setLanguage('es', this)">ES</button>
        </div>
      </div>
    </div>

    <img src="./logo-2.png" class="main-logo">

    <div class="hero">
      <div class="hero-content">

        <div class="wheel-3d">
          <div class="wheel-track">
            <div class="wheel-item">Tours</div>
            <div class="wheel-item">Contact</div>
            <div class="wheel-item">About</div>
            <div class="wheel-item">Hotels</div>
          </div>
        </div>

        <h1 data-en="Las Vegas Tours & Custom Adventures"
            data-es="Tours y Aventuras Personalizadas en Las Vegas">
          Las Vegas Tours & Custom Adventures
        </h1>

        <p data-en="Discover Las Vegas your way..."
           data-es="Descubre Las Vegas a tu manera...">
          Discover Las Vegas your way...
        </p>

        <div class="hero-buttons">
          <a href="#tours" class="btn btn-primary">View Tours</a>
          <a href="#contact" class="btn btn-secondary">Book Now</a>
        </div>

      </div>
    </div>
  </header>

  <footer>
    <p>© 2026 Milemundo. All rights reserved.</p>
  </footer>

  <script>
    function setLanguage(lang, btn){
      const elements = document.querySelectorAll('[data-en]');
      elements.forEach(el => {
        el.textContent = el.getAttribute('data-' + lang);
      });

      document.querySelectorAll('.lang-btn').forEach(button => {
        button.classList.remove('active');
      });

      btn.classList.add('active');
    }
  </script>

</body>
</html>
