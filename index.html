<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milemundo | Las Vegas Tours & Adventures</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#3f4a2c;
      color:#f5f1e8;
      line-height:1.6;
      overflow-x:hidden;
    }

    img{
      max-width:100%;
      display:block;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    /* HERO */
    .hero{
      height:100vh;
      background:linear-gradient(rgba(52,38,24,0.6), rgba(52,38,24,0.6)),
      url('./banner.jpg'); /* 👈 cambia por tu imagen */
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:flex-end; /* 👈 BAJA EL TEXTO */
      padding:0 20px 120px; /* 👈 controla qué tan abajo */
      text-align:center;
    }

    .hero-content{
      max-width:800px;
    }

    .hero h1{
      font-size:2.3rem;
      margin-bottom:10px;
    }

    .hero p{
      font-size:1.1rem;
    }

    /* SECCION EJEMPLO */
    .section{
      padding:60px 20px;
      text-align:center;
    }

    .section h2{
      margin-bottom:20px;
      font-size:2rem;
    }

    /* RESPONSIVE */
    @media(max-width:768px){
      .hero h1{
        font-size:1.8rem;
      }

      .hero{
        padding:0 15px 100px; /* 👈 ajuste móvil */
      }
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-content">
      <h1>Tours & Adventures in Las Vegas</h1>
      <p>Private tours to Grand Canyon, Hoover Dam, hotels and more</p>
    </div>
  </header>

  <!-- SECCION -->
  <section class="section">
    <h2>Our Experiences</h2>
    <p>Explore Las Vegas like never before with custom tours and adventures.</p>
  </section>

</body>
</html>
